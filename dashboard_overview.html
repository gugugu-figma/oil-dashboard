// ==================== 工具函数 ====================

/** 判断点是否在多边形内部（射线法） */
function pointInPolygon(px, py, polygon) {
  let inside = false;
  const n = polygon.length;
  for (let i = 0, j = n - 1; i < n; j = i++) {
    const xi = polygon[i][0], yi = polygon[i][1];
    const xj = polygon[j][0], yj = polygon[j][1];
    if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) {
      inside = !inside;
    }
  }
  return inside;
}

/** 根据罐区数量返回热力图颜色（蓝色系深浅） */
function getHeatColor(count) {
  if (count >= 43) return '#0d4fb3'; // 最深蓝
  if (count >= 35) return '#1a66d4';
  if (count >= 27) return '#2f7de0';
  if (count >= 19) return '#5b99eb';
  if (count >= 13) return '#8ab9f0';
  if (count >= 6)  return '#b8d4f5';
  return '#dce8f7';                   // 最浅蓝
}

// ==================== 1. Canvas 河南热力图 ====================

(function initMap() {
  const container = document.getElementById('mapContainer');
  const canvas = document.getElementById('henanMap');
  const ctx = canvas.getContext('2d');
  const tooltip = document.getElementById('mapTooltip');

  const CELL_SIZE = 20;          // 网格单元格大小
  const COLS = 32, ROWS = 23;    // 网格列数/行数
  const W = COLS * CELL_SIZE;    // 640
  const H = ROWS * CELL_SIZE;    // 460

  // 设置 Canvas 物理尺寸
  canvas.width = W;
  canvas.height = H;

  // 简化的河南省轮廓（顺时针，Canvas 坐标系）
  const henanOutline = [
    [55, 85],   // NW
    [100, 40],  // N
    [200, 28],  // N (Jiyuan/Jiaozuo)
    [300, 22],  // N (Xinxiang)
    [380, 30],  // N (Anyang)
    [470, 42],  // NE (Puyang bulge)
    [535, 58],  // NE corner
    [575, 105], // E
    [598, 165], // E (Shangqiu ext.)
    [582, 235], // E
    [552, 315], // SE (Zhoukou)
    [502, 385], // S
    [445, 435], // S (Zhumadian)
    [398, 452], // S (Xinyang ext.)
    [338, 446], // S
    [228, 410], // SW (Nanyang)
    [128, 350], // SW
    [68, 278],  // W
    [54, 198],  // W (Luoyang)
    [57, 140],  // W
  ];

  // 预计算每个网格单元的城市归属
  const cellLookup = new Array(COLS * ROWS).fill(null);
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const cx = col * CELL_SIZE + CELL_SIZE / 2;
      const cy = row * CELL_SIZE + CELL_SIZE / 2;
      if (!pointInPolygon(cx, cy, henanOutline)) continue;

      // 找到最近的城市
      let minDist = Infinity, nearestIdx = -1;
      cityData.forEach((city, idx) => {
        const dx = cx - city.cx, dy = cy - city.cy;
        const dist = dx * dx + dy * dy;
        if (dist < minDist) { minDist = dist; nearestIdx = idx; }
      });
      cellLookup[row * COLS + col] = nearestIdx;
    }
  }

  // 绘制地图
  function drawMap() {
    ctx.clearRect(0, 0, W, H);

    // 背景
    ctx.fillStyle = '#f9fafb';
    ctx.fillRect(0, 0, W, H);

    // 绘制网格色块
    for (let row = 0; row < ROWS; row++) {
      for (let col = 0; col < COLS; col++) {
        const cityIdx = cellLookup[row * COLS + col];
        if (cityIdx === null) continue;

        const count = cityData[cityIdx].count;
        ctx.fillStyle = getHeatColor(count);
        ctx.fillRect(col * CELL_SIZE + 1, row * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
      }
    }

    // 绘制河南省轮廓线
    ctx.beginPath();
    ctx.moveTo(henanOutline[0][0], henanOutline[0][1]);
    for (let i = 1; i < henanOutline.length; i++) {
      ctx.lineTo(henanOutline[i][0], henanOutline[i][1]);
    }
    ctx.closePath();
    ctx.strokeStyle = '#1a3a5c';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    ctx.fillStyle = 'rgba(0,0,0,0.0)'; // 透明填充让色块可见

    // 标记城市标签（仅较大城市）
    const majorCities = ['郑州市', '洛阳市', '南阳市', '开封市', '新乡市', '周口市'];
    cityData.filter(c => majorCities.includes(c.name)).forEach(city => {
      ctx.fillStyle = '#1a1a2e';
      ctx.font = '600 11px system-ui, -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(city.name, city.cx, city.cy);
    });
  }

  drawMap();

  // 鼠标悬停 - Tooltip
  canvas.addEventListener('mousemove', function(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;

    const col = Math.floor(mx / CELL_SIZE);
    const row = Math.floor(my / CELL_SIZE);

    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) {
      tooltip.style.display = 'none';
      return;
    }

    const cityIdx = cellLookup[row * COLS + col];
    if (cityIdx === null) {
      tooltip.style.display = 'none';
      return;
    }

    const city = cityData[cityIdx];
    tooltip.querySelector('.tt-city').textContent = city.name;
    tooltip.querySelector('.tt-count').textContent = '罐区数量：' + city.count + ' 座';
    tooltip.style.display = 'block';

    // 定位 tooltip 在容器内
    const containerRect = container.getBoundingClientRect();
    let left = (col * CELL_SIZE) / scaleX + CELL_SIZE / scaleX / 2;
    let top  = (row * CELL_SIZE) / scaleY - 8;

    // 防止溢出
    if (left + 120 > containerRect.width) left -= 130;
    if (top < 20) top = 10;

    tooltip.style.left = left + 'px';
    tooltip.style.top  = top + 'px';
  });

  canvas.addEventListener('mouseleave', function() {
    tooltip.style.display = 'none';
  });

  // 响应窗口大小变化
  window.addEventListener('resize', drawMap);
})();

      trigger: 'axis',
      axisPointer: { type: 'shadow' },

    },

// ==================== 3. ECharts 环形图（罐区规模分布） ====================

(function initDonutChart() {
  const dom = document.getElementById('donutChart');
  const chart = echarts.init(dom);

  const colors = ['#1a73e8', '#f0a050', '#6ec072'];
  const total = scaleDistribution.reduce((s, d) => s + d.value, 0);

  const option = {
    tooltip: {
      trigger: 'item',
      formatter: function(p) {
        return p.name + '<br/>数量：<b>' + p.value + '</b> 座（' + p.percent + '%）';
      }
    },
    legend: {
      bottom: 0, left: 'center', itemWidth: 10, itemHeight: 10,
      textStyle: { fontSize: 11, color: '#666' },
      formatter: function(name) {
        const item = scaleDistribution.find(d => d.name === name);
        return name + '  ' + (item ? item.value + '个 ' + item.pct : '');
      }
    },
    series: [{
      type: 'pie',
      radius: ['58%', '78%'],
      center: ['50%', '46%'],
      avoidLabelOverlap: false,
      itemStyle: { borderColor: '#fff', borderWidth: 3, borderRadius: 2 },
      label: { show: false },
      emphasis: { scaleSize: 8 },
      data: scaleDistribution.map((d, i) => ({
        value: d.value, name: d.name,
        itemStyle: { color: colors[i] }
      }))
    }],
    graphic: [
      // 环形图中心文字
      {
        type: 'text',
        left: 'center', top: '38%',
        style: { text: total, fontSize: 28, fontWeight: 700, fill: '#1a1a2e',
                 fontFamily: 'system-ui, -apple-system, sans-serif' }
      },
      {
        type: 'text',
        left: 'center', top: '48%',
        style: { text: '罐区总数', fontSize: 11, fill: '#999',
                 fontFamily: 'system-ui, -apple-system, sans-serif' }
      }
    ]
  };

  chart.setOption(option);
  window.addEventListener('resize', () => chart.resize());
})();


// ==================== 4. 渲染罐区列表 ====================

(function renderList() {
  const tbody = document.getElementById('tankListBody');
  tankFarmList.forEach((item, i) => {
    const tr = document.createElement('tr');
    const shortAddr = item.addr.length > 20 ? item.addr.slice(0, 20) + '…' : item.addr;
    const scaleTag = item.scale === '大规模'
      ? '<span class="scale-tag tag-large">大规模</span>'
      : item.scale === '中等规模'
        ? '<span class="scale-tag tag-medium">中等规模</span>'
        : '<span class="scale-tag tag-small">小规模</span>';

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td class="addr-cell" title="${item.addr}">${shortAddr}</td>
      <td>${item.area}</td>
      <td>${item.stays}</td>
      <td>${item.vehicles}</td>
      <td>${scaleTag}</td>
    `;
    tbody.appendChild(tr);
  });
})();
